html<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💙 Clickerz Shop 💙</title>
    <style>
        /* Original Blue & Cute Layout Theme */
        :root {
            --blue-bg: #e6f2ff;
            --blue-main: #b0e0e6;
            --blue-dark: #4682b4;
            --text-color: #333333;
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            background-color: var(--blue-bg);
            /* Polka dot background element pattern */
            background-image: radial-gradient(var(--blue-main) 15%, transparent 16%),
                              radial-gradient(var(--blue-main) 15%, transparent 16%);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Floating Background Elements Layer */
        .bg-element {
            position: fixed;
            font-size: 24px;
            z-index: -1;
            user-select: none;
            opacity: 0.6;
        }
        
        /* Floating animations for background */
        @keyframes floatUp {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        /* Sales Banner */
        .banner {
            background-color: var(--blue-dark);
            color: white;
            width: 100%;
            text-align: center;
            padding: 8px 0;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1px;
            z-index: 10;
        }

        /* Header & Logo */
        header {
            text-align: center;
            padding: 30px 20px;
            z-index: 2;
        }

        .logo {
            font-size: 42px;
            color: var(--blue-dark);
            text-shadow: 2px 2px white, 4px 4px var(--blue-main);
            margin: 0;
            font-weight: bold;
        }

        .subtitle {
            font-size: 16px;
            color: var(--text-color);
            margin-top: 5px;
            font-style: italic;
        }

        /* Main Store Layout */
        .container {
            max-width: 1000px;
            width: 90%;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
            margin-bottom: 50px;
            z-index: 2;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: white;
            border: 3px solid var(--blue-main);
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 8px 0 var(--blue-dark);
            transition: transform 0.2s;
            position: relative;
            overflow: hidden;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        .product-img-placeholder {
            width: 100%;
            height: 150px;
            background-color: #f0f8ff;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin-bottom: 15px;
        }

        .product-title {
            font-size: 18px;
            margin: 10px 0 5px 0;
            color: var(--blue-dark);
        }

        .product-price {
            font-size: 16px;
            font-weight: bold;
            color: var(--text-color);
            margin-bottom: 15px;
        }

        /* Cute Buttons */
        .btn {
            background-color: var(--blue-main);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 var(--blue-dark);
            transition: all 0.1s;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        /* Sidebar Cart */
